<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Ivre de Livres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Polices -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background-color: #f8e6ec;
      color: #3b2f2f;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      position: relative;
    }

    header {
      background-color: #f3e1d7;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      font-family: 'Cormorant Garamond', serif;
      color: #4A3B32;
    }

    /* Illustrations flottantes */
    .illustration {
      position: absolute;
      width: 150px;
      opacity: 1;
      animation: float 2s ease-in-out infinite alternate;
    }
    .illustration1 { top: 10%; left: 10%; }
    .illustration2 { top: 20%; right: 15%; }
    .illustration3 { bottom: 15%; left: 20%; }
    .illustration4 { bottom: 10%; right: 25%; }

    @keyframes float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-20px); }
    }

    .illustration:hover {
      transform: scale(1.1) rotate(5deg);
      opacity: 1;
      transition: 0.3s ease;
    }

    /* Animation fade-in */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Titre du blog */
    .blog-title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Dancing Script', serif;
      font-size: 4.4em;
      font-weight: 600;
      color: #4A3B32;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    /* Slogan */
    header h1 {
      font-size: 4em;
      margin: 0;
      color: #7A746E;
      font-weight: 400;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    /* Citation */
    header p.quote {
      color: #8B847E;
      font-size: 2.4em;
      margin-top: 20px;
      max-width: 80%;
      font-style: italic;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }

    /* ===========================
       Nouveau menu iconique
       =========================== */
    .menu-carte-container {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 100;
    }

    .menu-carte {
  position: relative;
  width: 60px;
  height: 60px;
  background-color: rgba(255,255,255,0.6);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center; /* 👉 centre l’icône par défaut */
  cursor: pointer;
  overflow: hidden;
  transition: width 0.3s ease, box-shadow 0.3s ease, justify-content 0.3s ease;
  text-decoration: none;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

    .menu-carte:hover {
  width: 170px;
  justify-content: flex-start; /* 👉 icône à gauche */
  padding-left: 12px;          /* espace confortable */
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transform: translateY(-2px) scale(1.05);
}

    .menu-icon {
  width: 30px;
  height: 30px;
  transition: transform 0.3s ease, filter 0.3s ease;
  filter: brightness(1.1);
  flex-shrink: 0; /* empêche l’icône de se tasser */
}

    .menu-text {
  position: absolute;
  left: 100px;
  white-space: nowrap;
  opacity: 0;
  font-weight: 600;
  color: #4A1F2D;
  font-family: 'Cormorant Garamond', serif;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: translateX(-10px);
}

.menu-carte:hover .menu-text {
  opacity: 1;
  transform: translateX(0);
}

.menu-carte:hover .menu-icon {
      transform: rotate(-10deg) scale(1.1);
    }

.menu-carte.active {
  background-color: rgba(255,105,180,0.7);
  box-shadow: 0 0 25px rgba(255,105,180,0.5);
}

    /* Footer */
    footer {
      position: absolute;
      bottom: 20px;
      text-align: center;
      width: 100%;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      color: #FFFFFF;
    }

    footer a {
      color: #FFFFFF;
      text-decoration: none;
      border-bottom: 1px dashed #FFFFFF;
    }

    /* Tablettes (≤1024px) */
@media (max-width: 1024px) {
  /* Titre et slogan plus petits */
  .blog-title {
    font-size: 3em;
    top: 20px;
  }
  header h1 {
    font-size: 3em;
  }
  header p.quote {
    font-size: 2em;
    max-width: 90%;
  }

  /* Illustrations plus petites et repositionnées */
  .illustration {
    width: 100px;
  }
  .illustration1 { top: 5%; left: 5%; }
  .illustration2 { top: 15%; right: 10%; }
  .illustration3 { bottom: 10%; left: 15%; }
  .illustration4 { bottom: 5%; right: 15%; }

  /* Menu plus petit et espacement réduit */
  .menu-carte {
    width: 50px;
    height: 50px;
  }
  .menu-carte:hover {
    width: 140px;
  }
  .menu-text {
    left: 85px;
    font-size: 0.9em;
  }
}

/* Téléphones (≤768px) */
@media (max-width: 768px) {

  html, body {
    overflow: auto;
  }

  /* Titres */
  .blog-title {
    font-size: 2.2em;
    top: 15px;
  }
  header h1 {
    font-size: 2em;
  }
  header p.quote {
    font-size: 1.5em;
    max-width: 95%;
  }

  /* Illustrations */
  .illustration {
    width: 70px;
  }
  .illustration1 { top: 2%; left: 5%; }
  .illustration2 { top: 10%; right: 5%; }
  .illustration3 { bottom: 10%; left: 5%; }
  .illustration4 { bottom: 2%; right: 5%; }

  /* ===========================
     MENU – PHONE ONLY
     =========================== */
  .menu-carte-container {
    top: 20px;
    right: 20px;
    left: auto;
    flex-direction: row;   /* horizontal */
    gap: 8px;
  }

  .menu-carte {
    width: 50px;
    height: 50px;
    padding: 0;
    border-radius: 9px;
    justify-content: center;
  }

  /* Désactiver l’extension hover sur mobile */
  .menu-carte:hover {
    width: 38px;
    padding-left: 0;
    justify-content: center;
  }

  .menu-icon {
    width: 20px;
    height: 20px;
  }

  /* Texte masqué sur phone */
  .menu-text {
    display: none;
  }

  /* Footer */
  footer {
    font-size: 0.8em;
    padding: 10px;
  }
}

  </style>
</head>
<body>

  <!-- Nouveau menu iconique -->
  <div class="menu-carte-container">
    <a href="index.html" class="menu-carte">
      <img src="home.png" alt="Accueil" class="menu-icon">
      <span class="menu-text">Accueil</span>
    </a>
    <a href="accueil revues.html" class="menu-carte">
      <img src="revue.png" alt="Revues" class="menu-icon">
      <span class="menu-text">Revues</span>
    </a>
    <a href="quotes.html" class="menu-carte">
      <img src="quote.png" alt="Quotes" class="menu-icon">
      <span class="menu-text">Quotes</span>
    </a>
  </div>

  <header>
    <!-- Illustrations flottantes -->
    <img src="livre.png" class="illustration illustration1" />
    <img src="birds.png" class="illustration illustration2" />
    <img src="tree.png" class="illustration illustration3" />
    <img src="encre.png" class="illustration illustration4" />

    <h2 class="blog-title">Ivre de Livres</h2>
    <h1>Lis. Ressens. Recommence.</h1>
    <p class="quote">« Un lecteur vit mille vies avant de mourir. » — George R.R. Martin</p>
  </header>

  <footer>
    <p>Téléchargez vos prochaines lectures ici ! <a href="https://z-library.sk/" target="_blank">Z-library</a></p>
<p>©2026 - Ivre de Livres</a></p>
  </footer>

</body>
</html>
