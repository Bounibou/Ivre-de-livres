<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Thriller - Ivre de Livres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(to bottom, #0a0a0f, #1a1a1f);
      color: #e6e6e6;
      padding: 40px 20px;
      text-align: center;
    }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #303030;
      width: 150px;
      border-radius: 12px;
      padding: 15px;
    }

    .book-img {
      width: 100%;
      border-radius: 8px;
    }

    .author {
      font-weight: bold;
      color: #ccc;
    }

    .title {
      margin-top: 8px;
      color: #ddd;
    }

    .search-bar {
      width: 90%;
      max-width: 400px;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<h1>THRILLER</h1>
<h3>La vérité laisse toujours des traces...</h3>

<input type="text" id="searchInput" class="search-bar" placeholder="Rechercher...">

<div class="cards-container" id="cards"></div>

<script>
let allBooks = [];

fetch("data/thriller.json")
  .then(res => res.json())
  .then(data => {
    allBooks = data;
    displayBooks(data);
  });

function displayBooks(books) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  books.forEach(book => {
    container.innerHTML += `
      <div class="card">
        <div class="author">${book.author}</div>
        <img src="${book.image}" class="book-img">
        <div class="title">${book.title}</div>
      </div>
    `;
  });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = allBooks.filter(b =>
    b.author.toLowerCase().includes(value) ||
    b.title.toLowerCase().includes(value)
  );

  displayBooks(filtered);
});
</script>

</body>
</html>
